<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Healthcare Assistant{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(135deg, #0066cc 0%, #004d99 100%);
            color: white;
            padding: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo:hover {
            opacity: 0.9;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            background: white;
            border-radius: 8px;
            padding: 40px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            color: #0066cc;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 16px;
        }

        .btn-primary {
            background-color: #0066cc;
            color: white;
        }

        .btn-primary:hover {
            background-color: #004d99;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,102,204,0.3);
        }

        .btn-secondary {
            background-color: #00b359;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #009944;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,179,89,0.3);
        }

        .btn-danger {
            background-color: #cc0000;
            color: white;
        }

        .btn-danger:hover {
            background-color: #990000;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }

        /* Symptom Search */
        .symptom-search {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background-color: #f0f0f0;
        }

        /* Symptoms Grid */
        .symptoms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .symptom-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .symptom-item:hover {
            background: #e8f0ff;
            border-color: #0066cc;
        }

        .symptom-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .symptom-item label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }

        /* Duration Selection */
        .duration-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .duration-option {
            display: flex;
            align-items: center;
        }

        .duration-option input[type="radio"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .duration-option label {
            margin: 0;
            cursor: pointer;
        }

        /* Results */
        .result-card {
            background: linear-gradient(135deg, #f0f4f8 0%, #ffffff 100%);
            border-left: 5px solid #0066cc;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
        }

        .result-disease {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 10px;
        }

        .result-confidence {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b359 0%, #0066cc 100%);
            transition: width 0.5s;
        }

        .top-3-diseases {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .disease-option {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #eee;
        }

        .disease-name {
            font-weight: 600;
            color: #333;
        }

        .disease-probability {
            color: #0066cc;
            font-weight: bold;
        }

        /* Risk Level */
        .risk-high {
            color: #cc0000;
            font-weight: bold;
        }

        .risk-medium {
            color: #ff9900;
            font-weight: bold;
        }

        .risk-low {
            color: #00b359;
            font-weight: bold;
        }

        /* Footer */
        footer {
            background: #34495e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        footer p {
            margin: 0;
        }

        /* Messages */
        .alert {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            border-left: 5px solid;
        }

        .alert-success {
            background: #d4edda;
            border-color: #00b359;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border-color: #cc0000;
            color: #721c24;
        }

        .alert-info {
            background: #d1ecf1;
            border-color: #0066cc;
            color: #0c5460;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0066cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav ul {
                gap: 15px;
                font-size: 14px;
            }

            h1 {
                font-size: 28px;
            }

            .section {
                padding: 20px;
            }

            .symptoms-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .duration-options {
                flex-direction: column;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">
                <span>🏥</span>
                <span>AI Healthcare</span>
            </a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/general_predict">Prediction</a></li>
                <li><a href="/personal_predict">My Health</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2024 AI Healthcare Assistant. Consult a doctor for proper diagnosis.</p>
    </footer>

    <script>
        // Utility function for API calls
        async function apiCall(url, method = 'GET', data = null) {
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };
            
            if (data) {
                options.body = JSON.stringify(data);
            }
            
            const response = await fetch(url, options);
            return response.json();
        }

        // Format disease name
        function formatDiseaseName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
